# /etc/nginx/sites-available/workspace
# Pre-baked in hermes-workspace-vnc image.
# start-vnc.sh symlinks this into sites-enabled at runtime.

server {
    listen 80;
    server_name _;
    root /opt/data/www;
    index index.html;

    # noVNC WebSocket → websockify bridge
    location /websockify {
        proxy_pass http://127.0.0.1:6080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    # Static files with clean URLs (/report → /report.html)
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }
}
