# /etc/nginx/sites-available/workspace
# Pre-baked in hermes-workspace-vnc image.
# start-vnc.sh symlinks this into sites-enabled at runtime.

server {
    listen 80;
    server_name _;
    root /opt/data/www;
    index index.html;

    # noVNC WebSocket → websockify bridge
    location /websockify {
        proxy_pass http://127.0.0.1:6080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    # Published files are served by the Hermes dashboard web server. The
    # control-plane publish proxy also targets this namespace directly.
    location /publish/ {
        proxy_pass http://127.0.0.1:9119;
    }

    # hermes-webui browser panel (Gateway Bridge -> :8787)
    location /webui/ {
        proxy_pass http://127.0.0.1:8787/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # Static files with clean URLs (/report -> /report.html), falling back to
    # the Hermes dashboard for routes that are not part of the noVNC web root.
    location / {
        try_files $uri $uri.html $uri/index.html @dashboard;
    }

    location @dashboard {
        proxy_pass http://127.0.0.1:9119;
    }
}
